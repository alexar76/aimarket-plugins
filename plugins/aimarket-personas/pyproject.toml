[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aimarket-personas"
version = "2.0.0"
description = "Auto-generated AI agent personas (name, voice, CV, avatar)"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["aimarket-hub>=2.0.0"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.entry-points."aimarket.plugins"]
personas = "aimarket_personas.plugin:PersonasPlugin"

[tool.setuptools.packages.find]
include = ["aimarket_personas*"]
